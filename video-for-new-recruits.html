<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Video For New Recruits - The Hip Handbook</title>
  <meta name="description" content="A curated YouTube archive of Tragically Hip concerts, soundboards, rarities and compilations - bucketed by era.">
  <meta property="og:title" content="Video For New Recruits - The Hip Handbook">
  <meta property="og:description" content="Curated YouTube archive of Hip concerts, soundboards, rarities and compilations, bucketed by era.">
  <meta property="og:image" content="https://thehiphandbook.tthpods.com/assets-optimized/band/band-photo-4.jpg">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://thehiphandbook.tthpods.com/video-for-new-recruits.html">
  <meta property="og:site_name" content="The Hip Handbook">
  <meta name="twitter:card" content="summary_large_image">
  <link rel="canonical" href="https://thehiphandbook.tthpods.com/video-for-new-recruits.html">
  <script defer src="https://cloud.umami.is/script.js" data-website-id="5a328248-7e6f-4440-aa23-1add33d46f33" data-domains="thehiphandbook.tthpods.com,forum-portal.tthpods.com"></script>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🍁</text></svg>">
  <link rel="manifest" href="/manifest.json">
  <link rel="apple-touch-icon" href="/icons/apple-touch-icon-180x180.png">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Hip Handbook">
  <meta name="theme-color" content="#0e0b16">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/shared.css">
  <link rel="stylesheet" href="/css/video-for-new-recruits.css">
</head>
<body>
<script src="/js/tth-member-gate.js"></script>
<a href="#main-content" class="skip-link">Skip to content</a>

<header>
  <div class="subtitle">Live Concert Videos</div>
  <h1>Video For New Recruits</h1>
  <p class="header-desc">A curated YouTube archive of Tragically Hip concerts, soundboards, radio simulcasts, rarities and compilations - bucketed by era.</p>
  <a href="index.html" class="back-link">&larr; Home</a>

  <div class="stats-row" id="statsRow">
    <div class="stat"><div class="stat-num" id="statTotal">--</div><div class="stat-lbl">Videos</div></div>
    <div class="stat"><div class="stat-num" id="statEras">--</div><div class="stat-lbl">Eras</div></div>
    <div class="stat"><div class="stat-num" id="statSBD">--</div><div class="stat-lbl">Soundboards</div></div>
    <div class="stat"><div class="stat-num" id="statPartial">--</div><div class="stat-lbl">Partial Lists</div></div>
  </div>
  <div class="stats-context" id="statsContext"></div>
</header>

<p class="credit" id="creditLine"></p>

<div class="grid-overlay" id="gridOverlay"></div>

<main id="main-content">
  <div class="album-grid" id="albumGrid"></div>
</main>

<footer id="site-footer"></footer>

<script>
(async function() {
  var resp = await fetch('data/youtube-videos.json');
  if (!resp.ok) {
    document.getElementById('albumGrid').innerHTML = '<p style="color:var(--muted2);text-align:center;grid-column:1/-1;">Could not load video data.</p>';
    return;
  }
  var data = await resp.json();

  // Show ↔ video map (v3.6 Long Time Running). Silent failure ok — back-links just won't render.
  var videoToShow = {};
  try {
    var svResp = await fetch('data/show-videos.json');
    if (svResp.ok) {
      var svData = await svResp.json();
      videoToShow = svData.byVideo || {};
    }
  } catch (e) { /* hide silently */ }

  function esc(str) {
    if (str == null) return '';
    var el = document.createElement('span');
    el.textContent = str;
    return el.innerHTML;
  }

  // Stats
  var globalStats = {
    total: data.summary.totalVideos,
    eras: data.summary.totalEras,
    sbd: data.summary.totalSBD,
    partial: data.summary.partialTracklists
  };

  var statTotal = document.getElementById('statTotal');
  var statEras = document.getElementById('statEras');
  var statSBD = document.getElementById('statSBD');
  var statPartial = document.getElementById('statPartial');
  var statsContext = document.getElementById('statsContext');

  function setStats(stats, label) {
    var nums = document.querySelectorAll('.stat-num');
    nums.forEach(function(n) { n.classList.add('updating'); });
    setTimeout(function() {
      statTotal.textContent = stats.total;
      statEras.textContent = stats.eras;
      statSBD.textContent = stats.sbd;
      statPartial.textContent = stats.partial;
      statsContext.textContent = label || '';
      nums.forEach(function(n) { n.classList.remove('updating'); });
    }, 150);
  }

  setStats(globalStats, '');

  if (data.credit) {
    document.getElementById('creditLine').textContent = data.credit + ' - Last updated ' + data.lastUpdated;
  }

  // DOM refs
  var grid = document.getElementById('albumGrid');
  var overlay = document.getElementById('gridOverlay');
  var currentFlippedCard = null;
  var currentPanel = null;

  function closeCurrentEra() {
    var cardToRefocus = currentFlippedCard;
    if (currentFlippedCard) {
      currentFlippedCard.classList.remove('flipped');
      currentFlippedCard = null;
    }
    if (currentPanel) {
      currentPanel.classList.remove('active');
      var search = currentPanel.querySelector('.panel-search');
      var filterBtns = currentPanel.querySelectorAll('.filter-btn');
      var videos = currentPanel.querySelectorAll('.video-card');
      var noResults = currentPanel.querySelector('.panel-no-results');
      if (search) search.value = '';
      filterBtns.forEach(function(b, i) {
        b.classList.toggle('active', i === 0);
      });
      videos.forEach(function(c) { c.style.display = ''; });
      if (noResults) noResults.style.display = 'none';
      currentPanel._activeFilter = 'all';
      currentPanel = null;
    }
    overlay.classList.remove('active');
    setStats(globalStats, '');
    if (cardToRefocus) cardToRefocus.focus();
  }

  function tagClass(t) {
    var k = t.toLowerCase();
    if (k === 'sbd') return 'tag-sbd';
    if (k === 'fm simulcast') return 'tag-fm';
    if (k === 'pro-shot') return 'tag-proshot';
    if (k === 'complete video' || k === 'complete bootleg') return 'tag-complete';
    if (k === 'compilation') return 'tag-comp';
    if (k === 'rehearsal') return 'tag-rehearsal';
    return 'tag-complete';
  }

  function buildVideoCard(v) {
    var card = document.createElement('div');
    card.className = 'video-card';
    card.setAttribute('data-tags', (v.tags || []).join(',').toLowerCase());
    var searchBlob = [
      v.title, v.rawTitle, v.location, v.dateDisplay,
      (v.tracks || []).join(' '),
      (v.tags || []).join(' ')
    ].filter(Boolean).join(' ').toLowerCase();
    card.setAttribute('data-search', searchBlob);

    var thumb = v.thumbnail
      ? '<img src="' + esc(v.thumbnail) + '" alt="' + esc(v.title) + ' thumbnail" loading="lazy" onerror="this.style.display=\'none\'">'
      : '';
    var thumbHtml =
      '<a class="video-thumb" href="' + esc(v.url) + '" target="_blank" rel="noopener noreferrer" aria-label="Watch ' + esc(v.title) + ' on YouTube">' +
        thumb +
        '<span class="video-thumb-play"><svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg></span>' +
      '</a>';

    var metaBits = [];
    if (v.dateDisplay) metaBits.push(esc(v.dateDisplay));
    if (v.location) metaBits.push(esc(v.location));
    var metaHtml = metaBits.length ? '<div class="video-meta">' + metaBits.join(' &middot; ') + '</div>' : '';

    var tagsHtml = '';
    if (v.tags && v.tags.length) {
      tagsHtml = '<div class="video-tags">' +
        v.tags.map(function(t) {
          return '<span class="tag ' + tagClass(t) + '">' + esc(t) + '</span>';
        }).join('') +
      '</div>';
    }

    var tracksHtml = '';
    if (v.tracks && v.tracks.length) {
      var previewCount = 3;
      var preview = v.tracks.slice(0, previewCount).join(' - ');
      var isLong = v.tracks.length > previewCount;
      var fullList = v.tracks.map(function(t) { return '<div>&bull; ' + esc(t) + '</div>'; }).join('');
      tracksHtml =
        '<div class="video-tracks">' +
          '<div class="video-tracks-head">Tracks' + (isLong ? ' (' + v.tracks.length + ')' : '') + '</div>' +
          (isLong
            ? '<div class="video-tracks-preview">' + esc(preview) + ' ...</div>' +
              '<div class="video-tracks-list">' + fullList + '</div>' +
              '<button type="button" class="video-tracks-toggle">Show all tracks</button>'
            : '<div class="video-tracks-list" style="display:block">' + fullList + '</div>') +
          (v.partialTracklist ? '<span class="video-tracks-partial">Partial tracklist - recovery pending</span>' : '') +
        '</div>';
    } else if (v.partialTracklist) {
      tracksHtml = '<div class="video-tracks"><span class="video-tracks-partial">Tracklist not yet recovered</span></div>';
    }

    var watchHtml = '<a class="video-watch" href="' + esc(v.url) + '" target="_blank" rel="noopener noreferrer">Watch on YouTube &rarr;</a>';

    // If this video maps to a known show, add a back-link to About This Map
    var showLinkHtml = '';
    var matchedShow = v.videoId ? videoToShow[v.videoId] : null;
    if (matchedShow && matchedShow.showId) {
      var showLabel = [matchedShow.venue, matchedShow.city].filter(Boolean).join(', ') || 'this show';
      showLinkHtml =
        '<a class="video-show-link" href="tour-map.html#show=' + esc(matchedShow.showId) + '" ' +
          'aria-label="View ' + esc(showLabel) + ' on the Interactive Tour Map">' +
          'View on Map &rarr;' +
        '</a>';
    }

    var titleHtml =
      '<div class="video-title">' +
        '<a href="' + esc(v.url) + '" target="_blank" rel="noopener noreferrer">' + esc(v.title || v.rawTitle) + '</a>' +
      '</div>';

    card.innerHTML =
      thumbHtml +
      '<div class="video-body">' +
        titleHtml +
        metaHtml +
        tagsHtml +
        tracksHtml +
        watchHtml +
        showLinkHtml +
      '</div>';

    // Tracks toggle
    var toggle = card.querySelector('.video-tracks-toggle');
    if (toggle) {
      toggle.addEventListener('click', function(e) {
        e.stopPropagation();
        var wrap = card.querySelector('.video-tracks');
        var expanded = wrap.classList.toggle('expanded');
        toggle.textContent = expanded ? 'Hide tracks' : 'Show all tracks';
      });
    }

    return card;
  }

  // Build era cards + panels
  data.eras.forEach(function(era) {
    var sbdCount = era.videos.filter(function(v) { return (v.tags || []).indexOf('SBD') !== -1; }).length;
    var partialCount = era.videos.filter(function(v) { return v.partialTracklist; }).length;

    // --- Grid card ---
    var card = document.createElement('button');
    card.type = 'button';
    card.className = 'flip-card';
    card.setAttribute('aria-label', 'Open ' + era.era + ' videos');

    var inner = document.createElement('div');
    inner.className = 'flip-card-inner';

    var front = document.createElement('div');
    front.className = 'flip-card-front';
    front.innerHTML =
      '<img src="' + esc(era.imagePath) + '" alt="' + esc(era.era) + '" loading="lazy">' +
      '<div class="flip-card-count">' + era.videos.length + ' videos</div>';

    var backPlaceholder = document.createElement('div');
    backPlaceholder.className = 'flip-card-back-placeholder';
    backPlaceholder.innerHTML = '<span>Loading...</span>';

    inner.appendChild(front);
    inner.appendChild(backPlaceholder);
    card.appendChild(inner);
    grid.appendChild(card);

    // --- Panel ---
    var panel = document.createElement('div');
    panel.className = 'expanded-panel';
    panel.setAttribute('role', 'dialog');
    panel.setAttribute('aria-modal', 'true');
    panel.setAttribute('aria-label', era.era + ' videos');
    panel._activeFilter = 'all';

    var panelHeader = document.createElement('div');
    panelHeader.className = 'panel-header';
    panelHeader.innerHTML =
      '<span class="panel-title">' + esc(era.era) + ' &middot; ' + era.videos.length + ' videos</span>' +
      '<button class="panel-close" aria-label="Close">&times;</button>';

    var panelControls = document.createElement('div');
    panelControls.className = 'panel-controls';
    panelControls.innerHTML =
      '<input type="text" class="panel-search" placeholder="Search title, location, or track..." aria-label="Search videos in ' + esc(era.era) + '">' +
      '<div class="panel-filter-row">' +
        '<button class="filter-btn active" data-filter="all">All</button>' +
        '<button class="filter-btn" data-filter="sbd">Soundboard</button>' +
        '<button class="filter-btn" data-filter="fm simulcast">FM Simulcast</button>' +
        '<button class="filter-btn" data-filter="pro-shot">Pro-Shot</button>' +
        '<button class="filter-btn" data-filter="compilation">Compilations</button>' +
      '</div>';

    var panelVideos = document.createElement('div');
    panelVideos.className = 'panel-videos';

    var noResults = document.createElement('div');
    noResults.className = 'panel-no-results';
    noResults.style.display = 'none';
    noResults.textContent = 'No videos match your search.';

    if (era.videos.length === 0) {
      noResults.textContent = 'No videos in this era yet.';
      noResults.style.display = '';
    } else {
      era.videos.forEach(function(v) {
        panelVideos.appendChild(buildVideoCard(v));
      });
    }

    panel.appendChild(panelHeader);
    panel.appendChild(panelControls);
    panel.appendChild(panelVideos);
    panel.appendChild(noResults);
    document.body.appendChild(panel);

    // Filter logic
    var panelSearch = panelControls.querySelector('.panel-search');
    var panelFilterBtns = panelControls.querySelectorAll('.filter-btn');

    function applyPanelFilters() {
      var q = panelSearch.value.toLowerCase().trim();
      var cards = panelVideos.querySelectorAll('.video-card');
      var af = panel._activeFilter;
      var anyVisible = false;

      cards.forEach(function(c) {
        var matchSearch = !q || c.getAttribute('data-search').indexOf(q) !== -1;
        var matchFilter = true;
        if (af !== 'all') {
          var tags = (c.getAttribute('data-tags') || '').split(',');
          matchFilter = tags.indexOf(af) !== -1;
        }
        var show = matchSearch && matchFilter;
        c.style.display = show ? '' : 'none';
        if (show) anyVisible = true;
      });
      noResults.style.display = anyVisible ? 'none' : '';
    }

    panelSearch.addEventListener('input', applyPanelFilters);
    panelControls.querySelector('.panel-filter-row').addEventListener('click', function(e) {
      var btn = e.target.closest('.filter-btn');
      if (!btn) return;
      panelFilterBtns.forEach(function(b) { b.classList.remove('active'); });
      btn.classList.add('active');
      panel._activeFilter = btn.getAttribute('data-filter');
      applyPanelFilters();
    });

    // Card click to open
    card.addEventListener('click', function() {
      if (card.classList.contains('flipped')) {
        closeCurrentEra();
        return;
      }
      if (currentFlippedCard) closeCurrentEra();
      card.classList.add('flipped');
      currentFlippedCard = card;

      setTimeout(function() {
        panel.classList.add('active');
        currentPanel = panel;
        overlay.classList.add('active');
        panelSearch.focus();
      }, 350);

      setStats({
        total: era.videos.length,
        eras: 1,
        sbd: sbdCount,
        partial: partialCount
      }, era.era);
    });

    panelHeader.querySelector('.panel-close').addEventListener('click', function(e) {
      e.stopPropagation();
      closeCurrentEra();
    });
  });

  overlay.addEventListener('click', closeCurrentEra);

  // Focus trap: keep Tab within the open dialog
  function trapPanelFocus(e) {
    var nodes = currentPanel.querySelectorAll('button, [href], input, select, textarea, [tabindex]:not([tabindex="-1"])');
    var focusables = Array.prototype.filter.call(nodes, function(el) { return !el.disabled && el.offsetParent !== null; });
    if (!focusables.length) return;
    var first = focusables[0], last = focusables[focusables.length - 1];
    if (e.shiftKey && document.activeElement === first) { e.preventDefault(); last.focus(); }
    else if (!e.shiftKey && document.activeElement === last) { e.preventDefault(); first.focus(); }
  }

  document.addEventListener('keydown', function(e) {
    if (!currentPanel) return;
    if (e.key === 'Escape') closeCurrentEra();
    else if (e.key === 'Tab') trapPanelFocus(e);
  });
})();
</script>
<script src="/js/shared-footer.js"></script>
</body>
</html>
