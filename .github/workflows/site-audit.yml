name: Weekly site audit

on:
  schedule:
    # Mondays 9am Toronto (13:00 UTC)
    - cron: '0 13 * * 1'
  workflow_dispatch: {}

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: '22'
      - name: Run site audit (links, assets, data integrity)
        run: node scripts/audit-site.js

  youtube:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: '22'
      - name: Check YouTube video liveness (archive, show videos, music videos, Road episodes)
        run: node scripts/check-youtube-videos.js --json youtube-report.json
      - name: Upload dead-video report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: youtube-report
          path: youtube-report.json
          if-no-files-found: ignore
