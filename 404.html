<script>
(function(){
  var target=new Date('2026-04-07T08:00:00-04:00').getTime();
  function tick(){
    var now=Date.now(),diff=target-now;
    if(diff<=0){document.getElementById('cdDays').textContent='0';document.getElementById('cdHrs').textContent='0';document.getElementById('cdMin').textContent='0';document.getElementById('cdSec').textContent='0';return}
    var d=Math.floor(diff/86400000),h=Math.floor((diff%86400000)/3600000),m=Math.floor((diff%3600000)/60000),s=Math.floor((diff%60000)/1000);
    document.getElementById('cdDays').textContent=d;document.getElementById('cdHrs').textContent=h;document.getElementById('cdMin').textContent=m;document.getElementById('cdSec').textContent=s;
  }
  if(document.getElementById('passGate')){tick();setInterval(tick,1000)}
})();
</script>
